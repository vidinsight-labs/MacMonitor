name: MacMonitor

options:
  bundleIdPrefix: com.macmonitor
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MacMonitor:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: MacMonitor
        excludes:
          - "Resources/MacMonitor.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macmonitor.app
        PRODUCT_NAME: MacMonitor
        # IOKit (SMC) erişimi için sandbox kapalı; entitlements dosyası ile.
        CODE_SIGN_ENTITLEMENTS: MacMonitor/Resources/MacMonitor.entitlements
        # Info.plist'i build ayarlarından üret (ayrı dosya gerekmez).
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        # Yerelde derleyip çalıştırmak için ad-hoc imza (geliştirici ekibi gerektirmez).
        # Xcode'da kendi ekibinle imzalamak istersen bu üçünü kaldırıp otomatik imzaya geç.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
