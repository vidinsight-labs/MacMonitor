name: MacMonitor

options:
  bundleIdPrefix: com.macmonitor
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "2.0"
    CURRENT_PROJECT_VERSION: "2"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  MacMonitor:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: MacMonitor
        excludes:
          - "Resources/MacMonitor.entitlements"
          - "Resources/PrivacyInfo.xcprivacy"
    dependencies:
      - target: MacMonitorWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macmonitor.app
        PRODUCT_NAME: MacMonitor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: MacMonitor/Resources/MacMonitor.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2025 MacMonitor"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSSupportsAutomaticTermination: YES
        INFOPLIST_KEY_NSSupportsSuddenTermination: YES
        PRIVACY_MANIFEST_PATH: MacMonitor/Resources/PrivacyInfo.xcprivacy

  MacMonitorWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: MacMonitorWidget
        excludes:
          - "Resources/MacMonitorWidget.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macmonitor.app.widget
        PRODUCT_NAME: MacMonitorWidget
        CODE_SIGN_ENTITLEMENTS: MacMonitorWidget/Resources/MacMonitorWidget.entitlements
        INFOPLIST_FILE: MacMonitorWidget/Info.plist

schemes:
  MacMonitor:
    build:
      targets:
        MacMonitor: all
        MacMonitorWidgetExtension: all
    run:
      config: Debug
    archive:
      config: Release
